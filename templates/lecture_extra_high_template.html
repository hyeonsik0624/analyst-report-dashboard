<!doctype html>
<html lang="ko"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{TITLE}}</title>
<style>
:root { --bg:#0b1020; --card:#121a31; --text:#e8ecff; --muted:#9fb0ff; --accent:#7aa2ff; --ok:#74d99f; --font:18px; --line:1.85; }
body.light { --bg:#f5f7ff; --card:#ffffff; --text:#13182b; --muted:#4a5686; --accent:#2f5cff; --ok:#198754; }
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;font-size:var(--font);line-height:var(--line)}
.wrap{max-width:980px;margin:0 auto;padding:24px}
.panel{background:var(--card);border:1px solid #2a3560;border-radius:16px;padding:18px;margin-bottom:16px}
h1,h2{margin:0 0 10px} .meta{color:var(--muted);font-size:.95rem}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;align-items:end}
input[type='range'],input[type='search']{width:100%}
button{background:var(--accent);color:white;border:none;border-radius:10px;padding:8px 10px;cursor:pointer}
.reader .para{padding:12px;border-bottom:1px dashed #334173;margin:0}
mark{background:#ffd54f;color:#222;padding:0 .15em;border-radius:4px}
textarea{width:100%;min-height:140px;background:transparent;color:var(--text);border:1px solid #3a4a84;border-radius:10px;padding:10px}
.grid{display:block}
.badge{display:inline-block;background:rgba(116,217,159,.2);color:var(--ok);padding:4px 8px;border-radius:999px;font-size:.8rem}
.quiz-item{border:1px solid #4258a0;border-radius:12px;padding:10px;margin:10px 0;background:rgba(122,162,255,.06)}
.quiz-item .q{font-weight:700;margin-bottom:8px}
.quiz-item label{display:block;margin:6px 0;cursor:pointer}
.quiz-item.correct{border-color:#2fbf71;background:rgba(47,191,113,.14)}
.quiz-item.wrong{border-color:#e35d6a;background:rgba(227,93,106,.14)}
.explain{color:var(--muted);font-size:.92rem;margin-top:6px;display:none}
</style></head>
<body><div class="wrap">
<section class="panel"><h1>{{HEADING}}</h1>
<p class="meta">{{META}}</p></section>
<section class="panel controls">
<label>본문 검색<input id="search" type="search" placeholder="키워드 검색" oninput="runSearch()"></label>
<label>글자 크기<input id="font" type="range" min="15" max="28" value="18" oninput="setFont(this.value)"></label>
<label>줄 간격<input id="line" type="range" min="1.4" max="2.4" step="0.05" value="1.85" oninput="setLine(this.value)"></label>
<button onclick="toggleTheme()">라이트/다크 전환</button><button onclick="toggleFocus()">집중모드</button><button onclick="clearMarks()">하이라이트 초기화</button>
</section>
<div class="grid">
<section class="panel reader" id="reader">{{PARAGRAPHS}}</section>
<section class="panel"><h2>셀프 퀴즈 (시험형)</h2>
<div id="quizBox"></div>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
  <button onclick="gradeQuiz()">채점하기</button>
  <button onclick="resetQuiz()">다시풀기</button>
</div>
<p id="quizResult" class="meta" style="margin-top:10px"></p>
</section>
<section class="panel"><h2>내 학습 메모</h2><textarea id="notes" placeholder="핵심 정리, 헷갈리는 포인트, 시험 전 체크사항"></textarea><p class="meta">자동 저장됨 (브라우저 로컬 저장소)</p></section>
</div></div>
<script>
const reader = document.getElementById('reader'); const original = reader.innerHTML; const notes = document.getElementById('notes');
notes.value = localStorage.getItem('{{NOTES_KEY}}') || ''; notes.addEventListener('input', ()=>localStorage.setItem('{{NOTES_KEY}}', notes.value));
function setFont(v){document.documentElement.style.setProperty('--font', v+'px')} function setLine(v){document.documentElement.style.setProperty('--line', v)}
function toggleTheme(){document.body.classList.toggle('light')} function toggleFocus(){document.querySelectorAll('.controls').forEach(el=>el.style.display=(el.style.display==='none'?'':'none'))}
function clearMarks(){reader.innerHTML = original;}
function markTerm(term){ if(!term) return; const esc = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); const re = new RegExp(esc,'gi'); reader.innerHTML = reader.innerHTML.replace(/<mark>|<\/mark>/g,''); reader.innerHTML = reader.innerHTML.replace(re, m=>`<mark>${m}</mark>`);} 
function runSearch(){markTerm(document.getElementById('search').value.trim())}

const quizData={{QUIZ_DATA}};
const quizBox=document.getElementById('quizBox');
function renderQuiz(){
  if(!quizData.length){ quizBox.innerHTML='<p class="meta">아직 등록된 문제가 없습니다.</p>'; document.getElementById('quizResult').textContent=''; return; }
  quizBox.innerHTML=quizData.map((x,i)=>`<div class="quiz-item" id="qi${i}"><div class="q">Q${i+1}. ${x.q}</div>${x.opts.map((o,k)=>`<label><input type="radio" name="q${i}" value="${k}"> ${o}</label>`).join('')}<div class="explain" id="ex${i}"></div></div>`).join('');
  document.getElementById('quizResult').textContent='';
}
function gradeQuiz(){
  if(!quizData.length) return;
  let score=0;
  quizData.forEach((x,i)=>{
    const box=document.getElementById(`qi${i}`); const ex=document.getElementById(`ex${i}`);
    box.classList.remove('correct','wrong');
    const picked=document.querySelector(`input[name="q${i}"]:checked`);
    const ok=picked && Number(picked.value)===x.a;
    if(ok){score++; box.classList.add('correct');} else {box.classList.add('wrong');}
    ex.style.display='block'; ex.textContent=`정답: ${x.opts[x.a]} / 해설: ${x.e}`;
  });
  const pct=Math.round(score/quizData.length*100);
  document.getElementById('quizResult').textContent=`점수: ${score}/${quizData.length} (${pct}%)`;
}
function resetQuiz(){renderQuiz();}
renderQuiz();
</script></body></html>
